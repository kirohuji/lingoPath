services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - apps/backend/.env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/v1/auth/providers').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - apps/backend/.env
    command: ["node", "dist/main.js"]
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

